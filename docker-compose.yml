version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tenet-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=app.py
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - tenet-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tenet-frontend
    ports:
      - "8081:80"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    restart: unless-stopped
    networks:
      - tenet-network

networks:
  tenet-network:
    driver: bridge
